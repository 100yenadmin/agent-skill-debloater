name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["22.13.0", "26.x"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm test
      - run: mkdir -p artifacts/skill-routing-evals/v0
      - run: >
          node src/eval-routing.mjs evals/skill-routing-evals/v0/scenarios.json
          --summary
          --report artifacts/skill-routing-evals/v0/report-node-${{ matrix.node-version }}.json
      - run: mkdir -p artifacts/rerank-quality/v0
      - run: >
          node src/eval-rerank.mjs evals/rerank-quality/v0/scenarios.json
          --summary
          --report artifacts/rerank-quality/v0/report-node-${{ matrix.node-version }}.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: skill-routing-evals-v0-node-${{ matrix.node-version }}
          path: artifacts/skill-routing-evals/v0/report-node-${{ matrix.node-version }}.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rerank-quality-v0-node-${{ matrix.node-version }}
          path: artifacts/rerank-quality/v0/report-node-${{ matrix.node-version }}.json
      - run: node bin/pack-sync check
      - run: npm run smoke:openclaw-adapter
      - run: mkdir -p artifacts/clean-room-install/v0
      - run: npm run acceptance:clean-room -- --report artifacts/clean-room-install/v0/report-node-${{ matrix.node-version }}.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: clean-room-install-v0-node-${{ matrix.node-version }}
          path: artifacts/clean-room-install/v0/report-node-${{ matrix.node-version }}.json
      - run: npm run acceptance:package
      - run: git diff --check
      - run: npm run release:check
      - run: npm run pack:dry-run
